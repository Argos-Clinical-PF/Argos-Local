# Compose del ambiente MVP compartido. Corre en una unica EC2 y usa imagenes de ECR.
services:
  postgres:
    image: postgres:16-alpine
    container_name: argos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - argos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: &logging
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  transcripcion:
    image: ${ECR_REGISTRY}/argos-transcripcion:${TRANSCRIPCION_TAG:-main}
    container_name: argos-transcripcion
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_IDIOMA: ${WHISPER_IDIOMA:-es}
    volumes:
      - argos-whisper-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s
    logging: *logging
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/argos-backend:${BACKEND_TAG:-main}
    container_name: argos-backend
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_MIGRATIONS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: ${PUBLIC_BASE_URL}
      APP_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      TRANSCRIPCION_SERVICE_URL: http://transcripcion:9000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: "24"
      JWT_ISSUER: argos-clinical
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_AUTH: "true"
      MAIL_SMTP_STARTTLS_ENABLE: "true"
      LOGIN_MAX_FAILED_ATTEMPTS: "5"
      LOGIN_LOCK_MINUTES: "15"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      transcripcion:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    logging: *logging
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/argos-frontend:${FRONTEND_TAG:-main}
    container_name: argos-frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *logging
    restart: unless-stopped

  gateway:
    image: caddy:2.10-alpine
    container_name: argos-gateway
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - argos-caddy-data:/data
      - argos-caddy-config:/config
    depends_on:
      frontend:
        condition: service_healthy
    logging: *logging
    restart: unless-stopped

volumes:
  argos-postgres-data:
  argos-whisper-cache:
  argos-caddy-data:
  argos-caddy-config:
