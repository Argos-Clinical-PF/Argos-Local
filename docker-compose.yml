services:
  postgres:
    image: postgres:16-alpine
    container_name: argos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-argos_clinical}
      POSTGRES_USER: ${POSTGRES_USER:-argos_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argos_app_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - argos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../Argos-Backend
      target: development
    container_name: argos-backend
    env_file:
      - .env 
    environment:
      SERVER_PORT: 8080
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-argos_clinical}
      DB_USERNAME: ${POSTGRES_USER:-argos_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-argos_app_local}
      DB_MIGRATIONS_ENABLED: ${DB_MIGRATIONS_ENABLED:-true}
      TRANSCRIPCION_SERVICE_URL: ${TRANSCRIPCION_SERVICE_URL:-http://transcripcion:9000}
      EMOCIONES_SERVICE_URL: ${EMOCIONES_SERVICE_URL:-http://emociones:9010}
      ARGOS_TEMAS_PROVIDER: ${ARGOS_TEMAS_PROVIDER:-LOCAL}
      ARGOS_TEMAS_MIN_CONFIDENCE: ${ARGOS_TEMAS_MIN_CONFIDENCE:-0.60}
      ANTHROPIC_TOPICS_MODEL: ${ANTHROPIC_TOPICS_MODEL:-claude-haiku-4-5}
      ANTHROPIC_TOPICS_MAX_TOKENS: ${ANTHROPIC_TOPICS_MAX_TOKENS:-900}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:5173}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-argosclinical@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-argosclinical@gmail.com}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      EMAIL_VERIFICATION_EXPIRATION_HOURS: ${EMAIL_VERIFICATION_EXPIRATION_HOURS:-24}
      JWT_SECRET: ${JWT_SECRET:-argos-clinical-local-dev-secret-32-bytes-minimum}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      JWT_ISSUER: ${JWT_ISSUER:-argos-clinical}
      LOGIN_MAX_FAILED_ATTEMPTS: ${LOGIN_MAX_FAILED_ATTEMPTS:-5}
      LOGIN_LOCK_MINUTES: ${LOGIN_LOCK_MINUTES:-15}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ../Argos-Backend:/app
      - argos-maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      transcripcion:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ../Argos-Frontend
      target: development
    container_name: argos-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_APP_ENV: ${VITE_APP_ENV:-development}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../Argos-Frontend:/app
      - argos-frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  transcripcion:
    build:
      context: ../Argos-Entrenamiento/servicio-transcripcion
    container_name: argos-transcripcion
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-medium}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_IDIOMA: ${WHISPER_IDIOMA:-es}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-5}
    ports:
      - "${TRANSCRIPCION_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  emociones:
    build:
      context: ../Argos-Entrenamiento
      dockerfile: servicio-emociones/Dockerfile
    container_name: argos-emociones
    environment:
      EMOCIONES_MODEL_ID: ${EMOCIONES_MODEL_ID:-emotiefflib-enet-b0-8-vgaf}
      EMOCIONES_MOCK: ${EMOCIONES_MOCK:-false}
      EMOCIONES_STRICT_LOAD: ${EMOCIONES_STRICT_LOAD:-false}
    ports:
      - "${EMOCIONES_PORT:-9010}:9010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9010/health')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  argos-postgres-data:
  argos-maven-cache:
  argos-frontend-node-modules:
