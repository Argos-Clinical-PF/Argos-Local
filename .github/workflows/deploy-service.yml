name: Deploy service image

on:
  workflow_call:
    inputs:
      stop_after:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::915093573341:role/argos-github-actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener bundle de despliegue
        uses: actions/checkout@v4
        with:
          repository: Argos-Clinical-PF/Argos-Local
          ref: main

      - name: Configurar credenciales AWS mediante OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Descubrir recursos
        id: aws
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters Name=tag:Name,Values=argos-app Name=instance-state-name,Values=pending,running,stopping,stopped \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          BUCKET=$(aws s3api list-buckets --query "Buckets[?starts_with(Name, 'argos-mvp-operacion-')].Name | [0]" --output text)
          PUBLIC_IP=$(aws ec2 describe-addresses \
            --filters Name=tag:Name,Values=argos-eip \
            --query 'Addresses[0].PublicIp' --output text)
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "url=https://${PUBLIC_IP//./-}.sslip.io" >> "$GITHUB_OUTPUT"

      - name: Publicar bundle de despliegue
        run: |
          PREFIX="s3://${{ steps.aws.outputs.bucket }}/deploy/${GITHUB_SHA}"
          aws s3 cp docker-compose.prod.yml "$PREFIX/docker-compose.prod.yml"
          aws s3 cp Caddyfile "$PREFIX/Caddyfile"
          aws s3 cp scripts/deploy-mvp.sh "$PREFIX/deploy-mvp.sh"
          aws s3 cp scripts/backup-postgres.sh "$PREFIX/backup-postgres.sh"

      - name: Iniciar EC2
        run: |
          INSTANCE_ID="${{ steps.aws.outputs.instance_id }}"
          aws ec2 start-instances --instance-ids "$INSTANCE_ID"
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"

      - name: Esperar Systems Manager
        run: |
          for intento in $(seq 1 30); do
            ESTADO=$(aws ssm describe-instance-information \
              --filters Key=InstanceIds,Values=${{ steps.aws.outputs.instance_id }} \
              --query 'InstanceInformationList[0].PingStatus' --output text)
            [ "$ESTADO" = "Online" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Desplegar tags main
        id: command
        run: |
          PREFIX="s3://${{ steps.aws.outputs.bucket }}/deploy/${GITHUB_SHA}"
          PARAMETERS=$(jq -cn \
            --arg prefix "$PREFIX" \
            --arg region "$AWS_REGION" \
            '{commands:[
              "mkdir -p /home/ec2-user/argos",
              "aws s3 cp \($prefix)/docker-compose.prod.yml /home/ec2-user/argos/docker-compose.prod.yml",
              "aws s3 cp \($prefix)/Caddyfile /home/ec2-user/argos/Caddyfile",
              "aws s3 cp \($prefix)/deploy-mvp.sh /home/ec2-user/argos/deploy-mvp.sh",
              "aws s3 cp \($prefix)/backup-postgres.sh /home/ec2-user/argos/backup-postgres.sh",
              "chmod 700 /home/ec2-user/argos/*.sh",
              "AWS_REGION=\($region) BACKEND_TAG=main FRONTEND_TAG=main TRANSCRIPCION_TAG=main /home/ec2-user/argos/deploy-mvp.sh"
            ]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.aws.outputs.instance_id }}" \
            --document-name AWS-RunShellScript \
            --parameters "$PARAMETERS" \
            --query 'Command.CommandId' --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          for intento in $(seq 1 180); do
            ESTADO=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.aws.outputs.instance_id }}" \
              --query Status --output text 2>/dev/null || true)
            [ "$ESTADO" = "Success" ] && exit 0
            case "$ESTADO" in Failed|Cancelled|TimedOut) exit 1 ;; esac
            sleep 10
          done
          exit 1

      - name: Mostrar resultado ante fallo
        if: failure() && steps.command.outputs.command_id
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.command.outputs.command_id }}" \
            --instance-id "${{ steps.aws.outputs.instance_id }}"

      - name: Validar URL publica
        run: |
          for intento in $(seq 1 30); do
            curl --fail --silent --show-error "${{ steps.aws.outputs.url }}/api/health" && exit 0
            sleep 10
          done
          exit 1

      - name: Detener EC2
        if: always() && inputs.stop_after
        run: aws ec2 stop-instances --instance-ids "${{ steps.aws.outputs.instance_id }}"
