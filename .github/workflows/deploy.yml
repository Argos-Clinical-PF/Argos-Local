name: Release MVP

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: ""
      stop_after:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      action:
        description: OperaciĂłn de release
        required: true
        type: choice
        options: [deploy, rollback]
      service:
        description: Componente a actualizar
        required: true
        type: choice
        options: [bundle, backend, frontend, entrenamiento]
      image_tag:
        description: Tag sha-* para el componente (vacĂ­o conserva current)
        required: false
        type: string
      stop_after:
        description: Detener EC2 despuĂ©s del smoke test
        required: true
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - Caddyfile
      - docker-compose.prod.yml
      - scripts/deploy-mvp.sh
      - .github/workflows/deploy.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: argos-production-release
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::915093573341:role/argos-github-actions

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener bundle de Argos-Local
        uses: actions/checkout@v4
        with:
          repository: Argos-Clinical-PF/Argos-Local
          ref: main

      - name: Configurar credenciales AWS mediante OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Descubrir recursos
        id: aws
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters Name=tag:Name,Values=argos-app Name=instance-state-name,Values=pending,running,stopping,stopped \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name, 'argos-mvp-operacion-')].Name | [0]" --output text)
          PUBLIC_IP=$(aws ec2 describe-addresses --filters Name=tag:Name,Values=argos-eip \
            --query 'Addresses[0].PublicIp' --output text)
          PUBLIC_URL=$(aws ssm get-parameter --name /argos/mvp/public-base-url \
            --query Parameter.Value --output text 2>/dev/null || true)
          [ -n "$PUBLIC_URL" ] || PUBLIC_URL="https://${PUBLIC_IP//./-}.sslip.io"
          {
            echo "instance_id=$INSTANCE_ID"
            echo "bucket=$BUCKET"
            echo "url=$PUBLIC_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Adquirir lock global de release
        id: lock
        env:
          BUCKET: ${{ steps.aws.outputs.bucket }}
        run: |
          LOCK_KEY="deploy/release.lock"
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg createdAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{repository:$repository,runId:$runId,createdAt:$createdAt}' > release-lock.json

          for intento in $(seq 1 180); do
            if aws s3api put-object \
              --bucket "$BUCKET" \
              --key "$LOCK_KEY" \
              --body release-lock.json \
              --content-type application/json \
              --if-none-match '*' >/dev/null 2>&1; then
              echo "acquired=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if (( intento % 30 == 0 )); then
              MODIFICADO=$(aws s3api head-object --bucket "$BUCKET" --key "$LOCK_KEY" \
                --query LastModified --output text 2>/dev/null || true)
              if [ -n "$MODIFICADO" ]; then
                EDAD=$(( $(date -u +%s) - $(date -u -d "$MODIFICADO" +%s) ))
                if [ "$EDAD" -gt 3600 ]; then
                  echo "Eliminando lock de release vencido (${EDAD}s)."
                  aws s3api delete-object --bucket "$BUCKET" --key "$LOCK_KEY"
                fi
              fi
            fi
            echo "Otro release esta activo; esperando lock ($intento/180)..."
            sleep 10
          done
          echo "No se pudo adquirir el lock global de release."
          exit 1

      - name: Preparar manifiesto inmutable
        id: manifest
        env:
          BUCKET: ${{ steps.aws.outputs.bucket }}
          ACTION: ${{ inputs.action || 'deploy' }}
          SERVICE: ${{ inputs.service || 'bundle' }}
          IMAGE_TAG: ${{ inputs.image_tag || '' }}
        run: |
          RELEASE_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CURRENT="s3://${BUCKET}/deploy/manifests/current.json"
          PREVIOUS="s3://${BUCKET}/deploy/manifests/previous.json"
          if [ "$ACTION" = "rollback" ]; then
            aws s3 cp "$PREVIOUS" manifest.json
          elif ! aws s3 cp "$CURRENT" manifest.json; then
            jq -n '{backend:"main",frontend:"main",transcripcion:"main",emociones:"main"}' > manifest.json
          fi
          SOURCE_RELEASE=$(jq -r '.releaseId // empty' manifest.json)
          if [ "$ACTION" != "rollback" ] && [ -n "$IMAGE_TAG" ]; then
            case "$SERVICE" in
              backend|frontend) jq --arg tag "$IMAGE_TAG" --arg key "$SERVICE" '.[$key]=$tag' manifest.json > next.json ;;
              entrenamiento) jq --arg tag "$IMAGE_TAG" '.transcripcion=$tag | .emociones=$tag' manifest.json > next.json ;;
              bundle) cp manifest.json next.json ;;
              *) echo "Servicio invĂˇlido: $SERVICE"; exit 1 ;;
            esac
            mv next.json manifest.json
          fi
          jq --arg release "$RELEASE_ID" --arg bundle "sha-${GITHUB_SHA}" \
            '.releaseId=$release | .bundle=$bundle' manifest.json > candidate.json
          {
            echo "release_id=$RELEASE_ID"
            echo "source_release=$SOURCE_RELEASE"
            echo "backend=$(jq -r .backend candidate.json)"
            echo "frontend=$(jq -r .frontend candidate.json)"
            echo "transcripcion=$(jq -r .transcripcion candidate.json)"
            echo "emociones=$(jq -r .emociones candidate.json)"
          } >> "$GITHUB_OUTPUT"
          cat candidate.json

      - name: Verificar imĂˇgenes del manifiesto en ECR
        run: |
          aws ecr batch-get-image --repository-name argos-backend \
            --image-ids imageTag=${{ steps.manifest.outputs.backend }} --query 'images[0].imageId' --output text | grep -v '^None$'
          aws ecr batch-get-image --repository-name argos-frontend \
            --image-ids imageTag=${{ steps.manifest.outputs.frontend }} --query 'images[0].imageId' --output text | grep -v '^None$'
          aws ecr batch-get-image --repository-name argos-transcripcion \
            --image-ids imageTag=${{ steps.manifest.outputs.transcripcion }} --query 'images[0].imageId' --output text | grep -v '^None$'
          aws ecr batch-get-image --repository-name argos-emociones \
            --image-ids imageTag=${{ steps.manifest.outputs.emociones }} --query 'images[0].imageId' --output text | grep -v '^None$'

      - name: Publicar bundle de release
        env:
          ACTION: ${{ inputs.action || 'deploy' }}
        run: |
          PREFIX="s3://${{ steps.aws.outputs.bucket }}/deploy/releases/${{ steps.manifest.outputs.release_id }}"
          if [ "$ACTION" = "rollback" ]; then
            SOURCE="s3://${{ steps.aws.outputs.bucket }}/deploy/releases/${{ steps.manifest.outputs.source_release }}"
            aws s3 cp "$SOURCE/docker-compose.prod.yml" "$PREFIX/docker-compose.prod.yml"
            aws s3 cp "$SOURCE/Caddyfile" "$PREFIX/Caddyfile"
            aws s3 cp "$SOURCE/deploy-mvp.sh" "$PREFIX/deploy-mvp.sh"
          else
            aws s3 cp docker-compose.prod.yml "$PREFIX/docker-compose.prod.yml"
            aws s3 cp Caddyfile "$PREFIX/Caddyfile"
            aws s3 cp scripts/deploy-mvp.sh "$PREFIX/deploy-mvp.sh"
          fi
          aws s3 cp candidate.json "$PREFIX/manifest.json"

      - name: Iniciar EC2
        run: |
          aws ec2 start-instances --instance-ids "${{ steps.aws.outputs.instance_id }}"
          aws ec2 wait instance-status-ok --instance-ids "${{ steps.aws.outputs.instance_id }}"

      - name: Esperar Systems Manager
        run: |
          for _ in $(seq 1 30); do
            ESTADO=$(aws ssm describe-instance-information \
              --filters Key=InstanceIds,Values=${{ steps.aws.outputs.instance_id }} \
              --query 'InstanceInformationList[0].PingStatus' --output text)
            [ "$ESTADO" = "Online" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Desplegar manifiesto
        id: command
        run: |
          PREFIX="s3://${{ steps.aws.outputs.bucket }}/deploy/releases/${{ steps.manifest.outputs.release_id }}"
          PARAMETERS=$(jq -cn \
            --arg prefix "$PREFIX" --arg region "$AWS_REGION" \
            --arg backend "${{ steps.manifest.outputs.backend }}" \
            --arg frontend "${{ steps.manifest.outputs.frontend }}" \
            --arg transcripcion "${{ steps.manifest.outputs.transcripcion }}" \
            --arg emociones "${{ steps.manifest.outputs.emociones }}" \
            '{commands:[
              "mkdir -p /home/ec2-user/argos",
              "aws s3 cp \($prefix)/docker-compose.prod.yml /home/ec2-user/argos/docker-compose.prod.yml",
              "aws s3 cp \($prefix)/Caddyfile /home/ec2-user/argos/Caddyfile",
              "aws s3 cp \($prefix)/deploy-mvp.sh /home/ec2-user/argos/deploy-mvp.sh",
              "chmod 700 /home/ec2-user/argos/deploy-mvp.sh",
              "AWS_REGION=\($region) BACKEND_TAG=\($backend) FRONTEND_TAG=\($frontend) TRANSCRIPCION_TAG=\($transcripcion) EMOCIONES_TAG=\($emociones) /home/ec2-user/argos/deploy-mvp.sh"
            ]}')
          COMMAND_ID=$(aws ssm send-command --instance-ids "${{ steps.aws.outputs.instance_id }}" \
            --document-name AWS-RunShellScript --parameters "$PARAMETERS" \
            --query 'Command.CommandId' --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          for _ in $(seq 1 180); do
            ESTADO=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.aws.outputs.instance_id }}" --query Status --output text 2>/dev/null || true)
            [ "$ESTADO" = "Success" ] && exit 0
            case "$ESTADO" in Failed|Cancelled|TimedOut) exit 1 ;; esac
            sleep 10
          done
          exit 1

      - name: Mostrar diagnĂłstico ante fallo
        if: failure() && steps.command.outputs.command_id
        run: aws ssm get-command-invocation --command-id "${{ steps.command.outputs.command_id }}" --instance-id "${{ steps.aws.outputs.instance_id }}"

      - name: Smoke test pĂşblico
        run: |
          for _ in $(seq 1 45); do
            if curl --fail --silent --show-error "${{ steps.aws.outputs.url }}/api/health" >/dev/null \
              && curl --fail --silent --show-error "${{ steps.aws.outputs.url }}/" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Promover manifiesto
        run: |
          CURRENT="s3://${{ steps.aws.outputs.bucket }}/deploy/manifests/current.json"
          PREVIOUS="s3://${{ steps.aws.outputs.bucket }}/deploy/manifests/previous.json"
          if aws s3 cp "$CURRENT" previous.json 2>/dev/null; then
            aws s3 cp previous.json "$PREVIOUS"
          fi
          aws s3 cp candidate.json "$CURRENT"

      - name: Detener EC2
        if: always() && (github.event_name == 'push' || inputs.stop_after)
        run: aws ec2 stop-instances --instance-ids "${{ steps.aws.outputs.instance_id }}"

      - name: Liberar lock global de release
        if: always() && steps.lock.outputs.acquired == 'true'
        run: |
          aws s3api delete-object \
            --bucket "${{ steps.aws.outputs.bucket }}" \
            --key deploy/release.lock

      - name: Resumen
        if: success()
        run: |
          {
            echo "## ARGOS MVP ${{ steps.manifest.outputs.release_id }}"
            echo "- URL: ${{ steps.aws.outputs.url }}"
            echo "- Backend: ${{ steps.manifest.outputs.backend }}"
            echo "- Frontend: ${{ steps.manifest.outputs.frontend }}"
            echo "- TranscripciĂłn: ${{ steps.manifest.outputs.transcripcion }}"
            echo "- Emociones: ${{ steps.manifest.outputs.emociones }}"
          } >> "$GITHUB_STEP_SUMMARY"
